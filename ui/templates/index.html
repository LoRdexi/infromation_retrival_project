<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas — محرك بحث استرجاع المعلومات</title>

    <!-- Distinctive type: Fraunces (display serif) · IBM Plex Sans Arabic (body) · JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230a0a0e'/%3E%3Ccircle cx='14' cy='14' r='6' fill='none' stroke='%23F6A94A' stroke-width='2.5'/%3E%3Cline x1='18.5' y1='18.5' x2='24' y2='24' stroke='%23F6A94A' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
    <!-- Atmospheric background layers -->
    <div class="bg-aurora" aria-hidden="true"></div>
    <div class="bg-grain" aria-hidden="true"></div>

    <main class="app">
        <!-- Hero -->
        <header class="hero">
            <h1 class="brand">Atlas</h1>
            <p class="tagline">ابحث في ملايين الوثائق باستخدام نماذج تمثيل متقدمة — <em>TF‑IDF</em> · <em>BM25</em> · <em>BERT</em> · <em>هجين</em></p>
        </header>

        <!-- Search console -->
        <section class="console">
            <div class="console-sheen" aria-hidden="true"></div>

            <!-- Dataset + model -->
            <div class="grid-2">
                <div class="field">
                    <label class="field-label" for="dataset">مجموعة البيانات</label>
                    <div class="select">
                        <select id="dataset">
                            <option value="beir/quora/test">Quora</option>
                        </select>
                        <span class="select-caret" aria-hidden="true"></span>
                    </div>
                </div>
                <div class="field">
                    <label class="field-label" for="model_type">نموذج البحث</label>
                    <div class="select">
                        <select id="model_type">
                            <option value="hybrid">Hybrid · هجين</option>
                            <option value="bm25">BM25</option>
                            <option value="bert">BERT</option>
                            <option value="tfidf">TF‑IDF</option>
                        </select>
                        <span class="select-caret" aria-hidden="true"></span>
                    </div>
                </div>
            </div>

            <!-- Model-specific parameters -->
            <div id="params-section" class="params">
                <!-- BM25 k1 / b -->
                <div id="bm25-params" class="grid-2">
                    <div class="field">
                        <label class="field-label" for="bm25_k1">BM25 · k1</label>
                        <input type="number" id="bm25_k1" class="input" value="1.6" step="0.1">
                    </div>
                    <div class="field">
                        <label class="field-label" for="bm25_b">BM25 · b</label>
                        <input type="number" id="bm25_b" class="input" value="0.75" step="0.05">
                    </div>
                </div>
                <!-- Hybrid type + fusion weight -->
                <div id="hybrid-params" class="stack">
                    <div class="field">
                        <label class="field-label" for="hybrid_type">نوع الهجين</label>
                        <div class="select">
                            <select id="hybrid_type">
                                <option value="parallel">متوازي — دمج BM25 + BERT</option>
                                <option value="serial">تسلسلي — BM25 ثم BERT</option>
                            </select>
                            <span class="select-caret" aria-hidden="true"></span>
                        </div>
                    </div>
                    <div id="hybrid-weight-wrapper" class="field">
                        <label class="field-label" for="hybrid_weight">وزن BM25 في الدمج <span class="weight-chip" id="weight-value">0.8</span></label>
                        <input type="range" id="hybrid_weight" class="slider" min="0" max="1" value="0.8" step="0.05">
                    </div>
                </div>
            </div>

            <!-- Query -->
            <div class="field">
                <label class="field-label" for="query">استعلام البحث</label>
                <div class="search-wrap">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="query" class="search-input" placeholder="اكتب سؤالك هنا…" autocomplete="off">
                    <div id="suggestions-box" class="suggestions hidden"></div>
                </div>
            </div>

            <!-- Toggles + action -->
            <div class="actions">
                <div class="toggles">
                    <label class="switch">
                        <input id="ner-rerank-toggle" type="checkbox">
                        <span class="switch-track"></span>
                        <span class="switch-label">تحسين NER</span>
                    </label>
                    <label class="switch">
                        <input id="cluster-rerank-toggle" type="checkbox">
                        <span class="switch-track"></span>
                        <span class="switch-label">تحسين بالمجموعات</span>
                    </label>
                </div>
                <button id="search-btn" class="btn-search">
                    <span>بحث</span>
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </section>

        <!-- Status / suggestions / results -->
        <div id="status" class="status"></div>
        <div id="alternative-suggestions" class="alt-suggestions"></div>
        <div id="results" class="results"></div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>

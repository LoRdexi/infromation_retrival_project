<!DOCTYPE html>
<!-- Set the language to Arabic and direction to right-to-left -->
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seekly</title>
    <!-- Include Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include the 'Cairo' font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="seekly_favicon_32x32.png">
</head>
<body class="text-gray-800">
    <!-- Main container for the page content -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Page header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900">Seekly</h1>
            <p class="text-lg text-gray-600 mt-2">ابحث في مجموعات البيانات باستخدام نماذج متقدمة</p>
        </div>

        <!-- Main search form container -->
        <div class="bg-white p-6 rounded-2xl shadow-lg max-w-3xl mx-auto">
            <!-- Grid for dataset and model selection dropdowns -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="dataset" class="block text-gray-700 font-bold mb-2">اختر مجموعة البيانات:</label>
                    <select id="dataset" class="shadow-sm appearance-none border rounded-lg w-full py-2 px-3 text-gray-700">
                        <option value="antique">Antique</option>
                        <option value="beir/quora">Quora</option>
                        <option value="lotte/lifestyle/dev">LOTTE (Lifestyle)</option>
                        <option value="wikir/en1k/test">Wikir (EN)</option>
                    </select>
                </div>
                <div>
                    <label for="model_type" class="block text-gray-700 font-bold mb-2">اختر نموذج البحث:</label>
                    <select id="model_type" class="shadow-sm appearance-none border rounded-lg w-full py-2 px-3 text-gray-700">
                        <option value="hybrid">Hybrid</option>
                        <option value="bm25">BM25</option>
                        <option value="bert">BERT</option>
                        <option value="tfidf">TF-IDF</option>
                    </select>
                </div>
            </div>
            
            <!-- Section for model-specific parameters (BM25 and Hybrid) -->
            <div id="params-section" class="space-y-4 mb-4">
                <!-- BM25 parameters (k1 and b), hidden by default -->
                <div id="bm25-params" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                    <div>
                        <label for="bm25_k1" class="block text-gray-700 font-bold mb-2">BM25 k1:</label>
                        <input type="number" id="bm25_k1" value="1.6" step="0.1" class="shadow-sm border rounded-lg w-full py-2 px-3">
                    </div>
                    <div>
                        <label for="bm25_b" class="block text-gray-700 font-bold mb-2">BM25 b:</label>
                        <input type="number" id="bm25_b" value="0.75" step="0.05" class="shadow-sm border rounded-lg w-full py-2 px-3">
                    </div>
                </div>
                <!-- Hybrid model weight slider, hidden by default -->
                <div id="hybrid-params" class="hidden">
                    <label for="hybrid_weight" class="block text-gray-700 font-bold mb-2">وزن BM25 في النموذج الهجين: <span id="weight-value">0.8</span></label>
                    <input type="range" id="hybrid_weight" min="0" max="1" value="0.8" step="0.05" class="w-full">
                </div>
            </div>

            <!-- Search query input section -->
            <div class="mb-4">
                <label for="query" class="block text-gray-700 font-bold mb-2">أدخل استعلام البحث:</label>
                <div class="relative">
                    <!-- The text input for the search query -->
                    <input type="text" id="query" class="shadow-sm border rounded-lg w-full py-3 px-4 text-gray-700" placeholder="اكتب هنا..." autocomplete="off">
                    <!-- A container for displaying query suggestions, positioned absolutely below the input -->
                    <div id="suggestions-box" class="absolute z-10 w-full bg-white border border-gray-300 rounded-b-lg mt-1 hidden shadow-lg"></div>
                </div>
            </div>
            
            <!-- Section for NER toggle and the main search button -->
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <input id="ner-rerank-toggle" type="checkbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="ner-rerank-toggle" class="ms-2 text-sm font-medium text-gray-900">تفعيل تحسين NER</label>
                    </div>
                    <div class="flex items-center">
                        <input id="cluster-rerank-toggle" type="checkbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="cluster-rerank-toggle" class="ms-2 text-sm font-medium text-gray-900">تفعيل تحسين بالمجموعات</label>
                    </div>
                </div>
                <button id="search-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded-md focus:outline-none focus:shadow-outline transition-transform transform hover:scale-105">
                    بحث
                </button>
            </div>
        </div>

        <!-- Divs to display search status (like "Searching...") and the final results -->
        <div id="status" class="mt-6 text-center"></div>
        <div id="alternative-suggestions" class="mt-4 text-center"></div>
        <div id="results" class="mt-4 space-y-4 max-w-4xl mx-auto"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
